<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>StudyStake — Redirecting...</title>
  <script type="text/javascript">
    // GitHub Pages SPA: redirect all paths to index.html
    var pathSegmentsToKeep = 1; // keep /StudyStake/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      (l.search || '') + (l.hash || '')
    );
  </script>
</head>
<body>
  <p>正在跳转... 如果没有自动跳转，<a href="/StudyStake/">点击这里</a></p>
</body>
</html>
